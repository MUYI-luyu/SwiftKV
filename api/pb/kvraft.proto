syntax = "proto3";

package pb;

option go_package = "kvraft/api/pb/kvraft/api/pb;pb";

// KV存储服务
service KVService {
  // 基础操作
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);

  // 范围查询（简单版）
  rpc Scan(ScanRequest) returns (ScanResponse);

  // Watch - 订阅键值变化（双向流）
  rpc Watch(stream WatchRequest) returns (stream WatchEvent);

  // 集群状态
  rpc GetClusterStatus(ClusterStatusRequest) returns (ClusterStatusResponse);

  // 分片管理（迁移用）
  rpc SetShardState(SetShardStateRequest) returns (SetShardStateResponse);
  rpc GetShardStates(GetShardStatesRequest) returns (GetShardStatesResponse);
}

// ============ 基础操作 ============
message GetRequest {
  string key = 1;
}

message GetResponse {
  string value = 1;
  int64 version = 2;
  string error = 3;
  int64 expires = 4;
}

message PutRequest {
  string key = 1;
  string value = 2;
  int64 version = 3;
  int64 ttl_seconds = 4;
}

message PutResponse {
  string error = 1;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  string error = 1;
}

// ============ 范围查询 ============
message ScanRequest {
  string prefix = 1;
  int32 limit = 2;
}

message ScanResponse {
  repeated KeyValue items = 1;
  string error = 2;
}

message KeyValue {
  string key = 1;
  string value = 2;
  int64 version = 3;
  int64 expires = 4;
}

// ============ Watch ============
message WatchCreateRequest {
  string key = 1;
  bool prefix = 2;
}

message WatchCancelRequest {
  int64 watch_id = 1;
}

message WatchRequest {
  oneof request_type {
    WatchCreateRequest create = 1;
    WatchCancelRequest cancel = 2;
  }
}

message WatchEvent {
  int64 watch_id = 1;
  string key = 2;
  string old_value = 3;
  string new_value = 4;
  int64 new_version = 5;
  string event_type = 6;
}

// ============ 集群状态 ============
message ClusterStatusRequest {}

message ClusterStatusResponse {
  string leader_id = 1;
  repeated NodeStatus nodes = 2;
  int64 current_term = 3;
  int64 last_applied = 4;
  int32 group_id = 5;
  int64 topology_epoch = 6;
}

message NodeStatus {
  int32 id = 1;
  string address = 2;
  bool is_leader = 3;
  bool is_alive = 4;
}

// ============ 分片迁移 ============

enum ShardState {
  OWNED = 0;      // 正常：本 group 拥有此 shard
  MIGRATING = 1;  // 迁出中：本 group 仍在服务，但写操作需转发到目标 group
  IMPORTING = 2;  // 迁入中：本 group 正在接收此 shard
  ABSENT = 3;     // 不拥有：shard 已迁移走，拒绝所有请求
}

message SetShardStateRequest {
  int32 shard_id = 1;
  ShardState state = 2;
  int32 target_group = 3;   // MIGRATING 时双写的目标 group
  int64 topology_epoch = 4; // 新的拓扑版本号
}

message SetShardStateResponse {
  string error = 1;
}

message ShardStateEntry {
  int32 shard_id = 1;
  ShardState state = 2;
  int32 target_group = 3;
}

message GetShardStatesRequest {}

message GetShardStatesResponse {
  repeated ShardStateEntry states = 1;
  int64 topology_epoch = 2;
}
