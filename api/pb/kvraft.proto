syntax = "proto3";

package api.pb;

option go_package = "kvraft/api/pb";

// KVraft 服务定义
service KVraft {
    rpc Get(GetRequest) returns (GetResponse) {}
    rpc Put(PutRequest) returns (PutResponse) {}
    rpc Delete(DeleteRequest) returns (DeleteResponse) {}
    rpc Scan(ScanRequest) returns (stream ScanResponse) {}
    rpc Watch(stream WatchRequest) returns (stream WatchEvent) {}
    rpc GetClusterStatus(ClusterStatusRequest) returns (ClusterStatusResponse) {}
}

// ============================================================
// Get 操作
// ============================================================
message GetRequest {
    string key = 1;
}

message GetResponse {
    string value = 1;
    int64 version = 2;
    string error = 3;
    int64 raft_index = 4;
}

// ============================================================
// Put 操作
// ============================================================
message PutRequest {
    string key = 1;
    string value = 2;
    int64 version = 3;  // CAS 版本号：0 表示新建，>0 表示更新
}

message PutResponse {
    bool success = 1;
    int64 new_version = 2;  // 成功时返回新版本号
    string error = 3;
    int64 raft_index = 4;
}

// ============================================================
// Delete 操作
// ============================================================
message DeleteRequest {
    string key = 1;
}

message DeleteResponse {
    bool success = 1;
    string error = 2;
    int64 raft_index = 3;
}

// ============================================================
// Scan 操作（范围查询）
// ============================================================
message ScanRequest {
    string start_key = 1;   // 起始键，空字符串表示从头开始
    int32 limit = 2;        // 返回数量限度
    int64 start_version = 3; // 可选：限制起始版本
}

message ScanResponse {
    repeated KVPair pairs = 1;
    bool has_more = 2;
    string error = 3;
}

message KVPair {
    string key = 1;
    string value = 2;
    int64 version = 3;
}

// ============================================================
// Watch 操作（事件订阅）
// ============================================================
message WatchCreateRequest {
    string key = 1;           // 监听的键
    int64 start_version = 2;  // 从指定版本开始接收事件，0 表示监听未来事件
}

message WatchRequest {
    oneof request_union {
        WatchCreateRequest create = 1;
        WatchCancelRequest cancel = 2;
    }
}

message WatchCancelRequest {
    int64 watch_id = 1;
}

message WatchEvent {
    int64 watch_id = 1;
    string key = 2;
    string old_value = 3;
    string new_value = 4;
    int64 old_version = 5;     // 旧版本号（跟踪版本变化）
    int64 new_version = 6;     // 新版本号
    string event_type = 7;     // "PUT", "DELETE", "DISCONNECTED"
    int64 timestamp = 8;       // 事件时间戳（纳秒）
    int64 raft_index = 9;      // Raft 日志索引（一致性证明）
}

// ============================================================
// 集群管理
// ============================================================
message ClusterStatusRequest {
    string level = 1;  // "brief", "detailed", "full"
}

message ClusterStatusResponse {
    int32 node_id = 1;
    string node_address = 2;
    bool is_leader = 3;
    int64 term = 4;
    int64 last_applied = 5;
    int64 commit_index = 6;          // Raft 提交索引（复制进度）
    int32 cluster_size = 7;
    repeated NodeStatus peers = 8;
    string status = 9;               // "healthy", "degraded", "unhealthy"
}

message NodeStatus {
    int32 id = 1;
    string address = 2;
    bool is_leader = 3;
    int64 match_index = 4;           // 该节点已复制的最大日志索引
    int64 next_index = 5;            // 下一个要发送的日志索引
    bool is_alive = 6;
}
