syntax = "proto3";

package api.pb;

option go_package = "kvraft/api/pb";

// KVraft 服务定义（当前实现的稳定子集）
service KVraft {
    rpc Get(GetRequest) returns (GetResponse) {}
    rpc Put(PutRequest) returns (PutResponse) {}
}

// ============================================================
// Get 操作
// ============================================================
message GetRequest {
    string key = 1;
}

message GetResponse {
    string value = 1;
    int64 version = 2;
    string error = 3;
    int64 raft_index = 4;
}

// ============================================================
// Put 操作
// ============================================================
message PutRequest {
    string key = 1;
    string value = 2;
    int64 version = 3;  // CAS 版本号：0 表示新建，>0 表示更新
}

message PutResponse {
    bool success = 1;
    int64 new_version = 2;  // 成功时返回新版本号
    string error = 3;
    int64 raft_index = 4;
}

