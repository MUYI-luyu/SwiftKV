# ============================================================
# KVraft 集群部署配置
# 默认启动 3 节点单 Raft 组 + Prometheus + Grafana
# ============================================================

services:
  # Prometheus 监控服务
  prometheus:
    image: prom/prometheus:latest
    container_name: kvraft-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - kvraft-node-0
      - kvraft-node-1
      - kvraft-node-2
    networks:
      - kvraft-net

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: kvraft-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - kvraft-net

  # ============================================================
  # KVraft Raft 集群（3 节点，单 Group）
  # 多 Group 分片模式见文档末尾注释
  # ============================================================

  # Node 0
  kvraft-node-0:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: kvraft-node-0
    environment:
      - NODE_ID=0
      - GROUP_ID=1
      - RAFT_PEERS=kvraft-node-0:50000,kvraft-node-1:50000,kvraft-node-2:50000
      - GRPC_LISTEN=0.0.0.0:6000
      - REST_LISTEN=0.0.0.0:8001
      - METRICS_LISTEN=0.0.0.0:9100
      - LOG_LEVEL=info
    ports:
      - "50000:50000"  # Raft RPC
      - "6000:6000"    # gRPC
      - "8001:8001"    # REST /health
      - "9100:9100"    # Prometheus metrics
    volumes:
      - kvraft-data-0:/data
    networks:
      - kvraft-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Node 1
  kvraft-node-1:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: kvraft-node-1
    environment:
      - NODE_ID=1
      - GROUP_ID=1
      - RAFT_PEERS=kvraft-node-0:50000,kvraft-node-1:50000,kvraft-node-2:50000
      - GRPC_LISTEN=0.0.0.0:6000
      - REST_LISTEN=0.0.0.0:8001
      - METRICS_LISTEN=0.0.0.0:9100
      - LOG_LEVEL=info
    ports:
      - "50001:50000"  # Raft RPC
      - "6001:6000"    # gRPC
      - "8002:8001"    # REST /health
      - "9101:9100"    # Prometheus metrics
    volumes:
      - kvraft-data-1:/data
    networks:
      - kvraft-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Node 2
  kvraft-node-2:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: kvraft-node-2
    environment:
      - NODE_ID=2
      - GROUP_ID=1
      - RAFT_PEERS=kvraft-node-0:50000,kvraft-node-1:50000,kvraft-node-2:50000
      - GRPC_LISTEN=0.0.0.0:6000
      - REST_LISTEN=0.0.0.0:8001
      - METRICS_LISTEN=0.0.0.0:9100
      - LOG_LEVEL=info
    ports:
      - "50002:50000"  # Raft RPC
      - "6002:6000"    # gRPC
      - "8003:8001"    # REST /health
      - "9102:9100"    # Prometheus metrics
    volumes:
      - kvraft-data-2:/data
    networks:
      - kvraft-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # 性能测试（按需启动：docker compose --profile benchmark up benchmark）
  # ============================================================

  benchmark:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.benchmark
    container_name: kvraft-benchmark
    environment:
      - TARGET_NODES=${TARGET_NODES:-kvraft-node-0:6000,kvraft-node-1:6000,kvraft-node-2:6000}
      - BENCHMARK_TYPE=${BENCHMARK_TYPE:-mixed}
      - NUM_CLIENTS=${NUM_CLIENTS:-10}
      - NUM_REQUESTS=${NUM_REQUESTS:-10000}
      - READ_RATIO=${READ_RATIO:-0.5}
      - DURATION=${DURATION:-30s}
    depends_on:
      - kvraft-node-0
      - kvraft-node-1
      - kvraft-node-2
    networks:
      - kvraft-net
    profiles:
      - benchmark
    command:
      - /bin/sh
      - -lc
      - |
        case "$BENCHMARK_TYPE" in
          read)  READ_RATIO=1.0 ;;
          write) READ_RATIO=0.0 ;;
          mixed) READ_RATIO=${READ_RATIO:-0.5} ;;
          *)     READ_RATIO=${READ_RATIO:-0.5} ;;
        esac
        exec /app/benchmark \
          -server-addrs="$TARGET_NODES" \
          -clients="$NUM_CLIENTS" \
          -requests="$NUM_REQUESTS" \
          -duration="${DURATION:-30s}" \
          -read-ratio="$READ_RATIO" \
          -sharded=false

# ============================================================
# 多 Group 分片模式（示例：2 Group × 3 Replica = 6 节点）
# 取消注释替换上面的单 Group 节点定义即可：
#
#   kvraft-g0-node-0:
#     ...
#     environment:
#       - NODE_ID=0
#       - GROUP_ID=1
#       - RAFT_PEERS=kvraft-g0-node-0:50000,kvraft-g0-node-1:50000,kvraft-g0-node-2:50000
#     ports: ["50000:50000", "6000:6000", ...]
#
#   kvraft-g1-node-0:
#     ...
#     environment:
#       - NODE_ID=0
#       - GROUP_ID=2
#       - RAFT_PEERS=kvraft-g1-node-0:50100,kvraft-g1-node-1:50100,kvraft-g1-node-2:50100
#     ports: ["50100:50000", "6100:6000", ...]
#
# 注意：不同 Group 使用不同的容器内部端口号（如 G1=50000, G2=50100），
# 避免在同一 overlay 网络中端口冲突。
# ============================================================

networks:
  kvraft-net:
    driver: bridge

volumes:
  kvraft-data-0:
    driver: local
  kvraft-data-1:
    driver: local
  kvraft-data-2:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
