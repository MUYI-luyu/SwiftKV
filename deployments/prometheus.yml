# ============================================================
# Prometheus 配置文件 — 监控 KVraft 集群性能指标
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'kvraft-cluster'

scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # KVraft 节点
  - job_name: 'kvraft-nodes'
    static_configs:
      - targets:
          - 'kvraft-node-0:9100'
          - 'kvraft-node-1:9100'
          - 'kvraft-node-2:9100'
        labels:
          cluster: 'kvraft'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
